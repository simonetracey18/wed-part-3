    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #fff0f5;
        }

        header {
            background-color: #ffe4ec;
            text-align: center;
            padding: 30px;
        }

        /* LOGO STYLE */
        .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 50px;
            color: #d63384;
        }

        header p {
            font-size: 16px;
            color: #555;
        }

        nav {
            background-color: #ffb6c1;
            text-align: center;
            padding: 12px;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        nav a:hover {
            color: white;
        }

        .hero {
            text-align: center;
            padding: 60px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 45px;
            color: #ff1493;
        }

        .hero p {
            font-size: 18px;
        }

        .btn {
            background-color: #ff69b4;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #ff1493;
        }

        .services {
            display: flex;
            justify-content: space-around;
            padding: 30px;
        }

        .card {
            background-color: white;
            padding: 20px;
            width: 25%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h3 {
            font-family: 'Playfair Display', serif;
        }

        footer {
            background-color: #ff69b4;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
